{% extends 'base.html' %}
{% set body_class = 'login-page' %}
{% block head_extra %}
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
{% endblock %}

{% block content %}
<div class="auth-wrap">
    <div class="auth-card">
        <h2 class="auth-title">MELUNE</h2>
        <p class="auth-subtitle">Đăng ký</p>

        <form id="registerForm" class="auth-form" method="post" onsubmit="event.preventDefault();">
            <div class="input-group">
                <input type="text" id="regUsername" name="username" placeholder="Username" required>
            </div>

            <div class="input-group">
                <input type="email" id="regEmail" name="email" placeholder="Email Address" required>
            </div>

            <div class="input-group password-group">
                <input type="password" id="regPassword" name="password" placeholder="Password" required>
                <button type="button" class="toggle-password" id="togglePassword" aria-label="Toggle password visibility">
                    <i class="fa fa-eye"></i>
                </button>
            </div>

            <button type="submit" class="btn-submit">Sign Up</button>

            <p id="registerMessage" class="message"></p>

            <div class="auth-switch">
                <span>Already have an account?</span>
                <a href="/auth/login-page">Sign in</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% block scripts_extra %}
    {{ super() }}
    <script>
        // Toggle password visibility
        (function(){
            const btn = document.getElementById('togglePassword');
            const pw = document.getElementById('regPassword');
            if(btn && pw) {
                btn.addEventListener('click', ()=>{
                    const isPassword = pw.type === 'password';
                    pw.type = isPassword ? 'text' : 'password';
                    btn.innerHTML = isPassword ? '<i class="fa fa-eye-slash"></i>' : '<i class="fa fa-eye"></i>';
                });
            }
        })();
    </script>
{% endblock %}
