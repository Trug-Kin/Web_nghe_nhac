<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quản lý Playlist - Admin</title>
    <link rel="stylesheet" href="/DoAnCoSo/css/admin.css">
</head>
<body>
    <h1>🎧 Quản lý Playlist</h1>
    <table border="1" cellpadding="8" cellspacing="0">
        <thead>
            <tr>
                <th>ID</th>
                <th>Tên Playlist</th>
                <th>Người tạo</th>
                <th>Số bài hát</th>
                <th>Mô tả</th>
                <th>Hành động</th>
            </tr>
        </thead>
        <tbody>
            {% for p in playlists %}
            <tr>
                <td>{{ p.id }}</td>
                <td>{{ p.name }}</td>
                <td>{{ p.user.username if p.user else 'Không rõ' }}</td>
                <td>{{ p.songs|length }}</td>
                <td>{{ p.description }}</td>
                <td>
                    <button onclick="deletePlaylist({{ p.id }})">🗑️ Xóa</button>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

    <script>
        async function deletePlaylist(id) {
            if (!confirm("Bạn có chắc muốn xóa playlist này?")) return;
            const res = await fetch(`/admin/playlists/${id}`, {
                method: "DELETE",
                credentials: "include"
            });
            const data = await res.json();
            alert(data.msg);
            location.reload();
        }
    </script>
</body>
</html>
