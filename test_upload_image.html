<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Test Upload Ảnh Bài Hát</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
            background: #f5f5f5;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input, select {
            width: 100%;
            padding: 8px;
            font-size: 14px;
        }
        button {
            background: #667eea;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background: #5568d3;
        }
        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 5px;
            display: none;
        }
        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>
<body>
    <h1>🎵 Test Upload Ảnh Bài Hát</h1>
    
    <form id="uploadForm">
        <div class="form-group">
            <label>Chọn bài hát:</label>
            <select id="songId" required>
                <option value="">-- Đang tải danh sách bài hát --</option>
            </select>
        </div>

        <div class="form-group">
            <label>Chọn ảnh (JPG, PNG):</label>
            <input type="file" id="imageFile" accept="image/*" required>
        </div>

        <button type="submit">📤 Upload Ảnh</button>
    </form>

    <div id="result" class="result"></div>

    <script>
        // Load danh sách bài hát
        async function loadSongs() {
            try {
                const response = await fetch('/api/songs');
                const songs = await response.json();
                
                const select = document.getElementById('songId');
                select.innerHTML = '<option value="">-- Chọn bài hát --</option>';
                
                songs.forEach(song => {
                    const option = document.createElement('option');
                    option.value = song.id;
                    option.textContent = `${song.id}. ${song.title} - ${song.artist_name || 'Unknown'}`;
                    select.appendChild(option);
                });
            } catch (error) {
                console.error('Lỗi load bài hát:', error);
                showResult('Không thể tải danh sách bài hát: ' + error.message, false);
            }
        }

        // Submit form
        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const songId = document.getElementById('songId').value;
            const imageFile = document.getElementById('imageFile').files[0];

            if (!songId || !imageFile) {
                showResult('Vui lòng chọn bài hát và ảnh!', false);
                return;
            }

            const formData = new FormData();
            formData.append('image', imageFile);

            try {
                showResult('Đang upload...', true);
                
                const token = localStorage.getItem('access_token');
                const response = await fetch(`/admin/api/song/${songId}`, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `Bearer ${token}`
                    },
                    body: formData
                });

                const result = await response.json();

                if (response.ok) {
                    showResult(`✅ Thành công! image_path: ${result.song.image_path}`, true);
                    console.log('Full response:', result);
                    
                    // Verify trong database
                    setTimeout(async () => {
                        const verify = await fetch(`/admin/api/song/${songId}`, {
                            headers: {
                                'Authorization': `Bearer ${token}`
                            }
                        });
                        const data = await verify.json();
                        console.log('Verify from DB:', data);
                        showResult(`✅ Upload thành công!\nĐường dẫn: ${result.song.image_path}\nĐã verify: ${data.image_path}`, true);
                    }, 500);
                } else {
                    showResult(`❌ Lỗi: ${result.msg || 'Unknown error'}`, false);
                }
            } catch (error) {
                showResult('❌ Lỗi kết nối: ' + error.message, false);
            }
        });

        function showResult(message, isSuccess) {
            const resultDiv = document.getElementById('result');
            resultDiv.textContent = message;
            resultDiv.className = 'result ' + (isSuccess ? 'success' : 'error');
            resultDiv.style.display = 'block';
        }

        // Load songs khi trang load
        loadSongs();
    </script>
</body>
</html>
